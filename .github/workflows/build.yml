# .github/workflows/build.yml
name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: ⚡ Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: 🔧 Cache PlatformIO packages
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio-esp32-2.0.9-${{ hashFiles('platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-esp32-2.0.9-

    - name: 🛠️ Build firmware
      run: |
        pio run -e esp32_node32s
      env:
        PLATFORMIO_BUILD_FLAGS: "-DCORE_DEBUG_LEVEL=0"

    - name: 📤 Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32-deauth-firmware
        path: .pio/build/esp32_node32s/firmware.bin
        retention-days: 7

    - name: 📋 Build summary
      run: |
        echo "✅ Build completed!"
        echo "📦 Binary size:"
        ls -lh .pio/build/esp32_node32s/firmware.bin
        echo "🔍 SHA256:"
        sha256sum .pio/build/esp32_node32s/firmware.bin

    - name: 🚀 Auto-release (optional)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: .pio/build/esp32_node32s/firmware.bin
        tag_name: build-${{ github.run_number }}
        name: "Build #${{ github.run_number }}"
        body: |
          📦 Автоматическая сборка ESP32 firmware
          🔹 Core: 2.0.9
          🔹 ESP-IDF: 4.4.x
          🔹 Board: NodeMCU-32S
          🔹 Commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
