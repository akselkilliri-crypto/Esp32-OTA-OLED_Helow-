# .github/workflows/build.yml
name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: ⚡ Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: 🔧 Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio-esp32-2.0.9-${{ hashFiles('platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-esp32-2.0.9-

    - name: 🛠️ Build firmware
      run: pio run -e esp32_node32s

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware
        path: .pio/build/esp32_node32s/firmware.bin
        retention-days: 7

    - name: 📋 Build info
      run: |
        echo "✅ Build completed"
        echo "📦 Binary:"
        ls -lh .pio/build/esp32_node32s/firmware.bin
        echo "🔍 Version check:"
        pio pkg list --global | grep arduinoespressif32 || true
