; platformio.ini
[platformio]
default_envs = esp32_node32s

[env:esp32_node32s]
platform = espressif32@5.2.0          ; Последняя платформа с поддержкой ESP-IDF 4.4
board = nodemcu-32s
framework = arduino
board_build.f_cpu = 240000000L
upload_speed = 921600
monitor_speed = 115200

; 🔒 Жёсткая привязка к Arduino Core 2.0.9
platform_packages = 
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/2.0.9/esp32-2.0.9.zip

; 🔧 Тулчейн для ESP32 (xtensa-esp32-elf-gcc)
platform_packages += 
    toolchain-xtensa-esp32 @ ~8.4.0+2021r2-patch5

; 📦 Дополнительные пакеты (обязательные для ESP-IDF 4.4)
platform_packages += 
    tool-esptoolpy @ ~1.40100.0
    tool-mkspiffs @ ~2.230.0

build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCONFIG_ESP32_WIFI_ENABLE_WPA3_SAE=0
    -Wno-unused-variable
    -Wno-unused-function

lib_deps = 
    ; Не добавляем внешние библиотеки — используем только встроенные WiFi.h и esp_wifi.h

; 🎯 Отключение ненужных функций для уменьшения размера
build_unflags = 
    -DCONFIG_BT_ENABLED
    -DCONFIG_BLE_ENABLED
