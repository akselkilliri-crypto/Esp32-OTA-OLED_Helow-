[platformio]
default_envs = esp32_node32s
src_dir = src
build_dir = .pio/build

[env:esp32_node32s]
platform = espressif32@5.2.0
board = nodemcu-32s
framework = arduino

platform_packages = 
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/2.0.9/esp32-2.0.9.zip

board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.partitions = default_8MB.csv

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCONFIG_ESP32_WIFI_ENABLE_WPA3_SAE=0
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-deprecated-declarations

build_unflags = 
    -DCONFIG_BT_ENABLED
    -DCONFIG_BLE_ENABLED

lib_deps =
